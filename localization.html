/* ── COMMENT SYSTEM COMPONENTS ── */
function CommentLayer({ active, comments, onAddComment, onDeleteComment }) {
  const [draft, setDraft] = useState(null);
  const [activePin, setActivePin] = useState(null);

  const handleClick = (e) => {
    if (!active) return;
    if (e.target.closest('.comment-popover') || e.target.closest('.comment-pin')) return;
    
    setDraft({
      x: e.pageX,
      y: e.pageY,
      text: ''
    });
  };

  useEffect(() => {
    if (active) {
      window.addEventListener('click', handleClick);
    } else {
      setDraft(null);
      setActivePin(null);
      window.removeEventListener('click', handleClick);
    }
    return () => window.removeEventListener('click', handleClick);
  }, [active]);

  return (
    <div style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: active ? 'auto' : 'none', zIndex: 999 }}>
      {comments.map((c, i) => (
        <div key={i}>
          <div 
            className="comment-pin" 
            style={{ left: c.x - 12, top: c.y - 24, pointerEvents: 'auto' }}
            onClick={(e) => { e.stopPropagation(); setActivePin(activePin === i ? null : i); }}
          >
            <span>{i + 1}</span>
          </div>
          {activePin === i && (
            <div className="comment-popover" style={{ left: c.x + 15, top: c.y - 20, pointerEvents: 'auto' }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: '#7B4DB8', marginBottom: 4 }}>COMMENT #{i+1}</div>
              <div style={{ fontSize: 13, color: '#333', marginBottom: 8 }}>{c.text}</div>
              <button 
                onClick={() => { onDeleteComment(i); setActivePin(null); }}
                style={{ background: 'none', border: 'none', color: '#FF4D4D', fontSize: 11, fontWeight: 600, cursor: 'pointer', padding: 0 }}
              >
                Delete
              </button>
            </div>
          )}
        </div>
      ))}

      {draft && (
        <div className="comment-popover" style={{ left: draft.x + 15, top: draft.y - 20, pointerEvents: 'auto' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#7B4DB8', marginBottom: 8 }}>LEAVE A COMMENT</div>
          <textarea 
            autoFocus
            className="comment-input"
            placeholder="Type your feedback..."
            value={draft.text}
            onChange={(e) => setDraft({ ...draft, text: e.target.value })}
          />
          <div style={{ display: 'flex', gap: 8 }}>
            <button 
              onClick={() => { onAddComment(draft); setDraft(null); }}
              style={{ background: '#7B4DB8', color: 'white', border: 'none', borderRadius: 6, padding: '5px 10px', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}
            >
              Save
            </button>
            <button 
              onClick={() => setDraft(null)}
              style={{ background: '#EEE', color: '#666', border: 'none', borderRadius: 6, padding: '5px 10px', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}
            >
              Cancel
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

const fmtLinks=(text,stepId)=>{

  return parts.map((p,i)=>{

    if(p==='Red Bin logging form/database')return <a key={i} href="https://www.notion.so/qonto/Growth-Efficiency-Roles-Responsibilities-And-Ways-of-Working-2ae31ee4c69680428660d48ba4b67658#31931ee4c6968068814de2683bf18120" target="_blank" rel="noopener noreferrer" style={{color:'#CE6033'}} onClick={e=>e.stopPropagation()}>{p}</a>;
    if(p==='Tolki'){
      const url=stepId===1?"https://www.notion.so/qonto/Write-24d31ee4c69681f0aab6ce8b465ab8cf":"https://www.notion.so/qonto/Localize-24d31ee4c696812ab5c1ee03e3aeda5e";
      return <a key={i} href={url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}>{p}</a>;
    }
    return p;
  });
};

function Accordion({title,items,type,stepId}){
  const[open,setOpen]=useState(false);
  if(!items||items.length===0)return null;
  const isGap=type==='gaps';
  const isSug=type==='suggestions';
  const isProc=type==='process';
  let bg,border,titleClr,textClr,badgeBg,icon;
  if(isGap){bg='#FFF5F5';border='#FECACA';titleClr='#991B1B';textClr='#7F1D1D';badgeBg='#FEE2E2';icon=<IAlert size={13} style={{color:'#991B1B'}}/>;}
  else if(isSug){bg='#FFFDF0';border='#FDE68A';titleClr='#854D0E';textClr='#713F12';badgeBg='#FEF9C3';icon=<IBulb size={13} style={{color:'#CA8A04'}}/>;}

  else{bg='#FFFDF0';border='#FDE68A';titleClr='#854D0E';textClr='#713F12';badgeBg='#FEF9C3';icon=<IHelp size={13} style={{color:'#CA8A04'}}/>;}
  return(
    <div style={{marginTop:isProc?8:10,border:`1px solid ${border}`,borderRadius:10,overflow:'hidden'}}>
      <div onClick={e=>{e.stopPropagation();setOpen(!open);}} style={{padding:'8px 12px',background:bg,display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {icon}
          <span style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',color:titleClr}}>{title}</span>
          {!isProc&&<span style={{fontSize:11,fontWeight:700,background:badgeBg,color:titleClr,borderRadius:20,padding:'1px 7px'}}>{items.length}</span>}
        </div>
        <IChevD size={13} style={{color:titleClr,transition:'transform 0.25s',transform:open?'rotate(180deg)':'rotate(0deg)'}}/>
      </div>
      <div className={`acc-body ${open?'open':''}`}>
        <div className="acc-inner">
          <div style={{padding:'10px 12px',background:bg,borderTop:`1px solid ${border}`}}>
            {isProc?(
              <ol style={{paddingLeft:16,margin:0,display:'flex',flexDirection:'column',gap:6}}>
                {items.map((item,i)=>(
                  <li key={i} style={{fontSize:13,color:textClr,lineHeight:1.55}}>{fmtLinks(item,stepId)}</li>
                ))}
              </ol>
            ):(
              <ul style={{listStyle:'none',display:'flex',flexDirection:'column',gap:8}}>
                {items.map((item,i)=>(
                  <li key={i} style={{display:'flex',gap:6,fontSize:14,color:textClr,lineHeight:1.55}}>
                    <IChevR size={12} style={{color:titleClr,opacity:0.5,marginTop:3,flexShrink:0}}/>
                    <span>{fmtLinks(item,stepId)}</span>
                  </li>
                ))}
              </ul>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

    id:5,title:'Red bin logging',subtitle:'Track & fix issues',
    channels:{
      'CRM':{owner:'Anyone',tools:['Red Bin']},
      'Website':{owner:'Anyone',tools:['Red Bin']},
      'Paid Ads':{owner:'Anyone',tools:['Red Bin']},
    },
  },
];

const GRAD_SS=['linear-gradient(135deg,#BFA6EA,#7B4DB8)','linear-gradient(135deg,#D5C8FF,#A585DB)','linear-gradient(135deg,#7B4DB8,#461068)','linear-gradient(135deg,#9BC5EA,#A585DB)','linear-gradient(135deg,#FFB590,#CE6033)'];

/* ── RENDER COMPONENTS ── */
function SSStepCard({step,gradBg,selectedUC,onSelectUC}){
  const hasMulti=step.useCases.length>1;
  return(
    <div style={{width:340,flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div style={{position:'relative',width:96,height:96}}>
        <div style={{width:96,height:96,borderRadius:'50%',background:gradBg,color:'#fff',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px rgba(0,0,0,0.14)'}} className={step.mandatory?'pulse':''}>
          <div style={{textAlign:'center',padding:'0 14px'}}>
            <div style={{fontSize:12,fontWeight:700,lineHeight:1.3}}>{step.title}</div>
          </div>
        </div>
        <div style={{position:'absolute',top:-2,right:-2,width:22,height:22,borderRadius:'50%',background:'#fff',border:'2px solid #E0E0E0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#3D3D3D'}}>{step.id}</div>
      </div>
      <div style={{width:1,height:14,background:'#CCCCCC'}}/>
      <div style={{width:'100%',background:'#fff',border:'1px solid #E0E0E0',borderRadius:14,padding:'16px',boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}}>
        {step.useCases.map((uc,i)=>(
          <div key={i} style={{border:'1.5px solid #E0E0E0',borderRadius:10,padding:'13px 13px',marginBottom:i<step.useCases.length-1?10:0}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#7B4DB8',marginBottom:8}}>{uc.label}</div>
            <div style={{display:'flex',alignItems:'flex-start',gap:7,background:'#F5F0FF',borderRadius:8,padding:'7px 10px',marginBottom:8}}>
              <IUser size={14} style={{color:'#7B4DB8',marginTop:1}}/>
              <span style={{fontSize:14,fontWeight:700,color:'#7B4DB8'}}>{uc.owner}</span>
            </div>
            {uc.steps && <Accordion title="Process" items={uc.steps} type="process" stepId={step.id}/>}
            <div style={{display:'flex',alignItems:'flex-start',gap:7,marginTop:8}}>
              <IWrench size={14} style={{color:'#8F8F8F'}}/>
              <div style={{fontSize:13,color:'#616161'}}>{uc.tools.join(', ')}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function SSWorkflow(){
  return(
    <div>
      <div style={{overflowX:'auto',paddingBottom:4}}>
        <div style={{display:'flex',alignItems:'flex-start',minWidth:'max-content',gap:0}}>
          {STEPS_SS.map((step,idx)=>(
            <React.Fragment key={step.id}>
              <SSStepCard step={step} gradBg={GRAD_SS[idx]} />
              {idx<STEPS_SS.length-1&&(
                <div style={{display:'flex',alignItems:'center',paddingTop:48,paddingLeft:8,paddingRight:8}}>
                   <svg width="36" height="16" viewBox="0 0 36 16"><line x1="1" y1="8" x2="28" y2="8" stroke="#CCCCCC" strokeWidth="1.5" strokeDasharray="4 3"/><polyline points="24,3 30,8 24,13" fill="none" stroke="#CCCCCC" strokeWidth="1.5"/></svg>
                </div>
              )}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App(){
  const [isCommentMode, setIsCommentMode] = useState(false);
  const [comments, setComments] = useState(() => {
    const saved = localStorage.getItem('local-flow-comments');
    return saved ? JSON.parse(saved) : [];
  });

  useEffect(() => {
    localStorage.setItem('local-flow-comments', JSON.stringify(comments));
  }, [comments]);

  const addComment = (c) => setComments([...comments, c]);
  const deleteComment = (idx) => setComments(comments.filter((_, i) => i !== idx));

  return(
    <div className={isCommentMode ? 'comment-mode-active' : ''} style={{ position: 'relative', minHeight: '100vh' }}>
      <header style={{background:'#fff',borderBottom:'1px solid #E0E0E0',padding:'14px 32px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:50}}>
        <div style={{fontSize:22,fontWeight:800,color:'#050505'}}>Localization workflow</div>
        <div style={{ display: 'flex', gap: 12 }}>
            <button 
                onClick={() => setIsCommentMode(!isCommentMode)}
                style={{
                    display: 'flex', alignItems: 'center', gap: 8, padding: '8px 16px', borderRadius: 10,
                    border: 'none', cursor: 'pointer', fontWeight: 700, fontFamily: 'inherit',
                    background: isCommentMode ? '#050505' : '#7B4DB8', color: '#fff'
                }}
            >
                <IMessage size={16} />
                {isCommentMode ? 'Exit Comment Mode' : 'Add Comments'}
            </button>
        </div>
      </header>

      <div style={{padding:'28px 32px 80px'}}>
        <div style={{background:'#fff',border:'1px solid #E0E0E0',borderRadius:12,padding:'14px 20px',marginBottom:24}}>
            <ITarget size={17} style={{color:'#7B4DB8', marginRight: 8}}/>
            <strong>Scope:</strong> Standard self-serve projects. Click <strong>"Add Comments"</strong> to leave feedback anywhere.
        </div>
        
        <SSWorkflow />
        
        <div style={{marginTop: 40}}>
            <LocalPOCsBlock />
        </div>
      </div>

      <CommentLayer 
        active={isCommentMode} 
        comments={comments} 
        onAddComment={addComment} 
        onDeleteComment={deleteComment}
      />

      {isCommentMode && (
        <div style={{ position: 'fixed', bottom: 20, left: '50%', transform: 'translateX(-50%)', background: '#050505', color: '#fff', padding: '8px 20px', borderRadius: 50, fontSize: 13, fontWeight: 600, zIndex: 10000, boxShadow: '0 4px 12px rgba(0,0,0,0.3)' }}>
            📍 Click anywhere on the page to drop a comment pin
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
