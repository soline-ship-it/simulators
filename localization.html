<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', Arial, sans-serif;
      background: #F5F5F5;
      color: #050505;
      font-size: 14px;
      line-height: 1.5;
    }
    a { color: #7B4DB8; font-weight: 600; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Scrollbar */
    ::-webkit-scrollbar { height: 5px; width: 5px; }
    ::-webkit-scrollbar-track { background: #E8E8E8; }
    ::-webkit-scrollbar-thumb { background: #B8B8B8; border-radius: 3px; }

    /* Animations */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeSlideIn 0.3s ease forwards; }

    /* Accordion */
    .acc-body {
      display: grid;
      grid-template-rows: 0fr;
      opacity: 0;
      transition: grid-template-rows 0.28s ease, opacity 0.28s ease;
    }
    .acc-body.open {
      grid-template-rows: 1fr;
      opacity: 1;
    }
    .acc-inner { overflow: hidden; }

    /* Track card hover */
    .track-card {
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      border-radius: 16px;
    }
    .track-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }

    /* Use case card hover */
    .uc-card {
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, opacity 0.25s ease;
    }
    .uc-card:hover { border-color: #A585DB !important; box-shadow: 0 2px 8px rgba(123,77,184,0.12); }
    .uc-card.dimmed { opacity: 0.25; pointer-events: none; }
    .uc-card.highlighted { border-color: #7B4DB8 !important; box-shadow: 0 3px 12px rgba(123,77,184,0.18) !important; }

    /* Step card */
    .step-col { transition: opacity 0.25s ease; }
    .step-col.dimmed { opacity: 0.25; pointer-events: none; }

    /* Toggle hint */
    .toggle-hint { color: #7B4DB8; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .toggle-hint:hover { text-decoration: underline; }

    /* Scope toggle */
    .scope-toggle {
      background: white;
      border: 1px solid #E0E0E0;
      border-radius: 12px;
      cursor: pointer;
      transition: box-shadow 0.18s ease;
    }
    .scope-toggle:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    /* Pulse for mandatory */
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(123,77,184,0.35); }
      70%  { box-shadow: 0 0 0 7px rgba(123,77,184,0); }
      100% { box-shadow: 0 0 0 0 rgba(123,77,184,0); }
    }
    .pulse { animation: pulse-ring 2.5s ease infinite; }
  </style>
</head>

/* ─── LINK FORMATTER ─────────────────────────────────────────────── */
const fmtLinks = (text, stepId) => {
  if (typeof text !== 'string') return text;
  const parts = text.split(/(QualityGuard|Red Bin logging form\/database|Tolki in Dust|Tolki OR Channel-specific Dust bot|Tolki)/g);
  return parts.map((p, i) => {
    if (p === 'QualityGuard')
      return <a key={i} href="https://www.notion.so/qonto/Check-copy-quality-24d31ee4c6968193bc6bc98d7f613d93" target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}>{p}</a>;
    if (p === 'Red Bin logging form/database')
      return <a key={i} href="https://www.notion.so/qonto/Growth-Efficiency-Roles-Responsibilities-And-Ways-of-Working-2ae31ee4c69680428660d48ba4b67658#31931ee4c6968068814de2683bf18120" target="_blank" rel="noopener noreferrer" style={{color:'#CE6033'}} onClick={e=>e.stopPropagation()}>{p}</a>;
    if (p === 'Tolki in Dust' || p === 'Tolki OR Channel-specific Dust bot' || p === 'Tolki') {
      const url = stepId === 1
        ? "https://www.notion.so/qonto/Write-24d31ee4c69681f0aab6ce8b465ab8cf"
        : "https://www.notion.so/qonto/Localize-24d31ee4c696812ab5c1ee03e3aeda5e";
      if (p === 'Tolki in Dust') return <span key={i}><a href={url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}>Tolki</a> in Dust</span>;
      if (p === 'Tolki OR Channel-specific Dust bot') return <span key={i}><a href={url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}>Tolki</a> OR Channel-specific Dust bot</span>;
      return <a key={i} href={url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}>{p}</a>;
    }
    return p;
  });
};

/* ─── ACCORDION ──────────────────────────────────────────────────── */
function Accordion({ title, items, type, stepId }) {
  const [open, setOpen] = useState(false);
  if (!items || items.length === 0) return null;
  const isGap = type === 'gaps';
  const cfg = isGap
    ? { bg: '#FFF5F5', border: '#FECACA', titleColor: '#991B1B', textColor: '#7F1D1D', badgeBg: '#FEE2E2', icon: <IcoAlert size={13} style={{color:'#991B1B'}}/> }
    : { bg: '#FFFDF0', border: '#FDE68A', titleColor: '#92400E', textColor: '#78350F', badgeBg: '#FEF9C3', icon: <IcoHelp size={13} style={{color:'#B45309'}}/> };
  return (
    <div style={{ marginTop: 10, border: `1px solid ${cfg.border}`, borderRadius: 10, overflow: 'hidden' }}>
      <div onClick={e => { e.stopPropagation(); setOpen(!open); }}
        style={{ padding: '9px 14px', background: cfg.bg, display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          {cfg.icon}
          <span style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', color: cfg.titleColor }}>{title}</span>
          <span style={{ fontSize: 10, fontWeight: 700, background: cfg.badgeBg, color: cfg.titleColor, borderRadius: 20, padding: '1px 7px' }}>{items.length}</span>
        </div>
        <IcoChevDown size={13} style={{ color: cfg.titleColor, transition: 'transform 0.25s', transform: open ? 'rotate(180deg)' : 'rotate(0deg)' }} />
      </div>
      <div className={`acc-body ${open ? 'open' : ''}`}>
        <div className="acc-inner">
          <div style={{ padding: '12px 14px', background: cfg.bg, borderTop: `1px solid ${cfg.border}` }}>
            <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 8 }}>
              {items.map((item, i) => (
                <li key={i} style={{ display: 'flex', gap: 6, fontSize: 13, color: cfg.textColor, lineHeight: 1.55 }}>
                  <IcoChevRight size={12} style={{ color: cfg.titleColor, opacity: 0.5, marginTop: 2, flexShrink: 0 }} />
                  <span>{fmtLinks(item, stepId)}</span>
                </li>
              ))}
            </ul>
          </div>
        </div>
      </div>
    </div>
  );
}

        /* ── PATH FINDER placeholder ── */
        <div style={{ padding: '60px 32px', textAlign: 'center' }}>
          <IcoBulb size={40} style={{ color: '#7B4DB8', margin: '0 auto 16px' }} />
          <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 8 }}>Find your path</h2>
          <p style={{ color: '#616161', fontSize: 14 }}>Coming soon — use the Full Workflow tab for now.</p>
        </div>
      ) : (
        <div style={{ padding: '28px 32px 80px' }}>

          <ScopeToggle />
          <HighLevelBar />

          {/* ── TRACK SELECTOR ── */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: '#8F8F8F', marginBottom: 12 }}>Select a workflow type</div>
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap' }}>
              {TRACKS.map(track => {
                const isActive = activeTrack === track.id;
                return (
                  <div key={track.id} className="track-card"
                    onClick={() => setActiveTrack(track.id)}
                    style={{
                      flex: '1 1 240px', maxWidth: 360, minWidth: 220,
                      border: `2px solid ${isActive ? track.accentBg : '#E0E0E0'}`,
                      background: isActive ? track.accentBg : '#fff',
                      padding: '18px 20px',
                      position: 'relative',
                    }}>
                    {/* Sizing badge — prominent */}
                    <div style={{
                      display: 'inline-block',
                      background: isActive ? track.badgeBg : '#F5F5F5',
                      color: isActive ? track.badgeText : '#616161',
                      border: `1px solid ${isActive ? 'rgba(255,255,255,0.2)' : '#E0E0E0'}`,
                      fontSize: 11, fontWeight: 700, borderRadius: 20, padding: '3px 10px',
                      marginBottom: 10, letterSpacing: '0.03em',
                    }}>{track.sizing}</div>
                    {track.locked && (
                      <IcoLock size={13} style={{ position: 'absolute', top: 14, right: 14, color: isActive ? 'rgba(255,255,255,0.5)' : '#B8B8B8' }} />
                    )}
                    <div style={{ fontSize: 15, fontWeight: 700, color: isActive ? '#fff' : '#050505', lineHeight: 1.3, marginBottom: 6 }}>{track.label}</div>
                    <p style={{ fontSize: 13, color: isActive ? 'rgba(255,255,255,0.78)' : '#616161', margin: 0, lineHeight: 1.6 }}>{track.desc}</p>
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── CONTENT PER TRACK ── */}
          <div key={activeTrack} className="fade-in">
            {isCreative ? (
              <CreativeFactoryPanel />
            ) : (
              <>
                {/* BAU channel tabs */}
                {isBau && (
                  <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
                    {BAU_CHANNELS.map(ch => (
                      <button key={ch} onClick={() => setActiveBauChannel(ch)}
                        style={{
                          padding: '8px 20px', borderRadius: 8, border: `1.5px solid ${activeBauChannel === ch ? '#3275C4' : '#E0E0E0'}`,
                          background: activeBauChannel === ch ? '#EFF6FF' : '#fff',
                          color: activeBauChannel === ch ? '#1E40AF' : '#616161',
                          fontSize: 13, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
                          transition: 'all 0.15s ease',
                        }}
                      >{ch}</button>
                    ))}
                  </div>
                )}

                <Legend />

                <div key={isBau ? activeBauChannel : 'self'} className="fade-in">
                  <WorkflowRow
                    steps={currentSteps}
                    accentColor={currentAccent}
                    gradients={currentGradients}
                  />
                </div>

                <LocalPOCs />
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
