<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Localization Workflow</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
</head>
<body class="bg-[#F8FAFC] text-slate-900 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- ICONS ---
    const ChevronRight = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const AlertTriangle = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const UserIcon = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const Lightbulb = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>;
    const WorkflowIcon = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="6" height="6" rx="1"></rect><rect x="15" y="15" width="6" height="6" rx="1"></rect><path d="M9 6h4a2 2 0 0 1 2 2v10"></path></svg>;
    const GitBranchIcon = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>;
    const ArrowLeft = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
    const HelpCircle = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const Wrench = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>;
    const UsersIcon = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
    const CheckCircle2 = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>;
    const BookOpen = ({ className }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;

    // --- HELPER: TEXT FORMATTER FOR HYPERLINKS ---
    const formatLinks = (text) => {
      if (typeof text !== 'string') return text;
      const parts = text.split(/(QualityGuard)/g);
      return parts.map((part, i) => 
        part === 'QualityGuard' ? (
          <a key={i} 
             href="https://www.notion.so/qonto/Check-copy-quality-24d31ee4c6968193bc6bc98d7f613d93?source=copy_link" 
             target="_blank" 
             rel="noopener noreferrer" 
             className="text-indigo-600 font-bold hover:underline"
             onClick={(e) => e.stopPropagation()}
          >
            QualityGuard
          </a>
        ) : part
      );
    };

    // --- DATA ---
    const WORKFLOW_STEPS = [
      { id: 1, title: 'EN Master Copy', subtitle: 'Create English source content', color: 'from-purple-500 to-purple-600', owner: 'Project Owner (varies by context):\n• Comms Partner for Global projects\n• CRM Manager for CRM-specific projects', tools: ['Tolki in Dust (AI-generated content creation)', 'Channel-specific Dust bot (linked to ToV skill)', 'Qontent (for Website/CRM, directly in-platform)'], notes: ['💡 ALWAYS use QualityGuard in Dust if master copy is not delivered by an EN-native speaker', '⚡ Exception: High-visibility creative (not self-serve) → Creative Factory'] },
      { id: 2, title: 'Localization', subtitle: 'Generate localized versions', color: 'from-blue-500 to-blue-600', owner: 'Owner (varies by context):\n• Local Market POC (standard)\n• CRM Manager for CRM projects (due to high volume)', tools: ['Tolki in Dust', 'Channel-specific Dust bot (linked to ToV skill)', 'Qontent (for Website and CRM)'], gaps: ['No standardized request path for localization (only #proofread-crm exists for CRM)'], questions: ['Is the current POC list sustainable or should we review it?', 'Should we standardize a single process to request localization from local POCs?'] },
      { id: 3, title: 'AI Quality Check + Native Review', subtitle: '⚠️ MANDATORY step', color: 'from-green-500 to-green-600', owner: 'Local Market POC (or person who delivered the localization in step 2)', tools: ['QualityGuard in Dust (AI copy quality check) — MANDATORY first step', 'Native review (if needed): When the translator is not a native speaker OR no designated native speaker exists', 'CRM-specific process: Request proofread in #proofread-crm on Slack AFTER QualityGuard validation', 'For native support for 🇳🇱 Dutch and 🇵🇹 Portuguese: #new-markets-localization-help on Slack'], notes: ['🔍 Focus: Tone of Voice alignment, clarity, and grammar — NOT content accuracy or factual validation', '⚠️ IMPORTANT: Compliance remains your responsibility'] },
      { id: 4, title: 'Content Upload & Publishing', subtitle: 'Deploy localized content', color: 'from-teal-500 to-teal-600', owner: 'Upload owner (varies by channel):\n• Website: Local Market POC duplicates page in Qontent\n• CRM: CRM Manager uploads in Qontent\n• Ads, Social, Video: Channel POC handles upload on platform', tools: ['Website: Qontent', 'CRM: Qontent', 'Other platforms: Channel POC in charge'], gaps: ['Website: Page duplication in other languages should be 100% owned by Local Teams at localization stage—NOT Comms Partners.'] },
      { id: 5, title: 'Red Bin Logging', subtitle: 'Track & fix issues', color: 'from-red-500 to-red-600', owner: 'Anyone involved in the workflow', tools: ['Red Bin logging form/database'], notes: ['• Purpose: Log quality issues discovered after launch OR broken delivery processes', '• Analyze: Machine/Human/Method failure → implement permanent fix'] },
    ];

    // Dynamic Quiz generation based on previous answers
    const getQuizQuestions = (answers) => {
      // Logic for filtering channels based on selected role
      let channelOptions = [];
      if (answers.role === 'CRM Manager') {
        channelOptions = [ { label: 'CRM / Email', value: 'CRM / Email' } ];
      } else if (answers.role === 'Other Channel Owner') {
        channelOptions = [
          { label: 'Website', value: 'Website' },
          { label: 'Social Media', value: 'Social Media' },
          { label: 'Paid Ads', value: 'Paid Ads' },
          { label: 'Video Content', value: 'Video Content' }
        ];
      } else {
        // Comms Partner sees all standard options
        channelOptions = [
          { label: 'Website', value: 'Website' },
          { label: 'CRM / Email', value: 'CRM / Email' },
          { label: 'Social Media', value: 'Social Media' },
          { label: 'Paid Ads', value: 'Paid Ads' },
          { label: 'Video Content', value: 'Video Content' }
        ];
      }

      return [
        {
          id: 'role', title: 'What is your role?', type: 'single',
          options: [
            { label: 'Comms Partner (Global projects)', value: 'Comms Partner' },
            { label: 'CRM Manager', value: 'CRM Manager' },
            { label: 'Other Channel Owner (Website, Ads, Video, Social...)', value: 'Other Channel Owner' }
          ]
        },
        { id: 'channel', title: 'Which channel is this content for?', type: 'single', options: channelOptions },
        {
          id: 'projectType', title: 'What type of project is this?', type: 'single',
          options: [
            { label: 'High-visibility creative (brand campaign, major launch)', value: 'High-visibility' },
            { label: 'Standard content (self-serve)', value: 'Standard content' }
          ]
        },
        {
          id: 'language', title: 'Which language(s)/market(s) are you targeting? (Select all that apply)', type: 'multiple',
          options: [
            { label: '🇫🇷 French', value: 'French' },
            { label: '🇩🇪 German', value: 'German' },
            { label: '🇮🇹 Italian', value: 'Italian' },
            { label: '🇪🇸 Spanish', value: 'Spanish' },
            { label: '🇵🇹 Portuguese', value: 'Portuguese' },
            { label: '🇳🇱 Dutch', value: 'Dutch' }
          ]
        }
      ];
    };

    // --- COMPONENT: QUIZ WIZARD ---
    const PathFinder = () => {
      const [answers, setAnswers] = useState({});
      const [step, setStep] = useState(0);

      const questions = getQuizQuestions(answers);

      const handleSingleSelect = (id, value) => {
        setAnswers({ ...answers, [id]: value });
        setStep(step + 1);
      };

      const handleToggleMultiple = (id, value) => {
        const currentList = answers[id] || [];
        if (currentList.includes(value)) {
          setAnswers({ ...answers, [id]: currentList.filter(v => v !== value) });
        } else {
          setAnswers({ ...answers, [id]: [...currentList, value] });
        }
      };

      // Retrieves POC names for multiple selected languages
      const getPocNames = (langs) => {
        if (!langs || langs.length === 0) return 'Local Market POCs';
        return langs.map(lang => {
          switch(lang) {
            case 'French': return '@Delphine de Roquemaurel';
            case 'German': return '@Hannah Lüdicke';
            case 'Italian': return '@lollo';
            case 'Spanish': return '@cristina.gomez';
            case 'Portuguese': return '@Julia Latorre';
            case 'Dutch': return '@rosemarijn.disseldorp (non-SEO), @Dimitri Jordens (SEO), @stijn.teves (partnerships)';
            default: return 'Local Market POCs';
          }
        }).join(', ');
      };

      const renderQuiz = () => {
        const question = questions[step];
        const progress = Math.round(((step + 1) / questions.length) * 100);
        const isMultiple = question.type === 'multiple';
        const currentMultipleSelections = answers[question.id] || [];

        return (
          <div className="max-w-4xl mx-auto w-full pt-10 pb-20 px-4">
            <div className="text-center mb-8">
              <Lightbulb className="w-8 h-8 text-amber-500 mx-auto mb-3" />
              <h2 className="text-3xl font-bold text-slate-900 mb-2">Find Your Path</h2>
              <p className="text-slate-500">Answer a few questions to get a personalized workflow guide</p>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 min-h-[400px]">
              {/* Progress Bar */}
              <div className="mb-8">
                <div className="flex justify-between text-sm text-slate-600 mb-3 font-medium">
                  <span>Question {step + 1} of {questions.length}</span>
                  <span>{progress}%</span>
                </div>
                <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-purple-500 to-purple-400 transition-all duration-300" style={{ width: `${progress}%` }}></div>
                </div>
              </div>

              <h3 className="text-xl font-bold text-slate-900 mb-6">{question.title}</h3>
              
              <div className="space-y-3">
                {question.options.map((opt) => {
                  if (isMultiple) {
                    const isSelected = currentMultipleSelections.includes(opt.value);
                    return (
                      <button
                        key={opt.value}
                        onClick={() => handleToggleMultiple(question.id, opt.value)}
                        className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex justify-between items-center group 
                          ${isSelected ? 'border-purple-500 bg-purple-50 text-purple-900' : 'border-slate-200 hover:border-purple-300 bg-white text-slate-700'}`}
                      >
                        <span className="font-semibold">{opt.label}</span>
                        {isSelected && <CheckCircle2 className="w-6 h-6 text-purple-600" />}
                      </button>
                    );
                  } else {
                    return (
                      <button
                        key={opt.value}
                        onClick={() => handleSingleSelect(question.id, opt.value)}
                        className="w-full text-left p-4 rounded-xl border border-slate-200 hover:border-blue-500 hover:bg-slate-50 transition-all duration-200 flex justify-between items-center group bg-white"
                      >
                        <span className="font-semibold text-slate-700">{opt.label}</span>
                        <ChevronRight className="w-5 h-5 text-slate-400 group-hover:text-blue-500" />
                      </button>
                    );
                  }
                })}
              </div>

              {/* Multiple choice requires a "Continue" button */}
              {isMultiple && (
                <button 
                  onClick={() => setStep(step + 1)} 
                  disabled={currentMultipleSelections.length === 0}
                  className="mt-6 w-full py-4 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                >
                  Generate My Workflow
                </button>
              )}

              {step > 0 && (
                <button 
                  onClick={() => setStep(step - 1)}
                  className="mt-8 flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-slate-800 transition-colors w-full justify-center p-3 border border-slate-200 rounded-xl"
                >
                  <ArrowLeft className="w-4 h-4" /> Back
                </button>
              )}
            </div>
          </div>
        );
      };

      const renderResults = () => {
        // High-Visibility Stop
        if (answers.projectType === 'High-visibility') {
          return (
            <div className="max-w-4xl mx-auto w-full pt-10 pb-20 px-4">
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center mt-10">
                <AlertTriangle className="w-16 h-16 text-amber-500 mx-auto mb-4" />
                <h3 className="text-2xl font-bold text-slate-900 mb-4">High-Visibility Creative Project</h3>
                <p className="text-lg text-slate-600 mb-8">This is not a standard self-serve project. The localization workflow does not apply here.</p>
                <div className="bg-amber-50 text-amber-800 p-4 rounded-xl font-semibold border border-amber-200 inline-block">
                  👉 Please route this request through the Creative Factory.
                </div>
                <div className="mt-12">
                   <button onClick={() => {setStep(0); setAnswers({});}} className="text-blue-600 font-semibold hover:underline">Start Over</button>
                </div>
              </div>
            </div>
          );
        }

        // Generate Steps dynamically based on answers
        const pocNamesString = getPocNames(answers.language);
        const displayRole = answers.role === 'Other Channel Owner' ? 'Channel Owner' : answers.role;
        
        let masterOwner = displayRole;
        let locOwner = pocNamesString;
        let qcOwner = pocNamesString;
        let uploadOwner = displayRole;

        // CRM Manager rules overrides
        if (answers.role === 'CRM Manager' || answers.channel === 'CRM / Email') {
           masterOwner = 'CRM Manager';
           locOwner = 'CRM Manager';
           qcOwner = 'CRM Manager';
           uploadOwner = 'CRM Manager';
        }

        // Website rules overrides (Local POC always uploads website pages)
        if (answers.channel === 'Website') {
           uploadOwner = pocNamesString; 
        }

        // Tools assembly
        const masterTools = ['Tolki in Dust', 'Channel-specific bot (linked to ToV skill)'];
        if (answers.channel === 'Website' || answers.channel === 'CRM / Email') masterTools.push('Qontent');
        masterTools.push('QualityGuard in Dust (if not EN-native)');

        const locTools = ['Tolki in Dust', 'Channel-specific bot (linked to ToV skill)'];
        if (answers.channel === 'Website' || answers.channel === 'CRM / Email') locTools.push('Qontent');

        const qcTools = ['QualityGuard in Dust (MANDATORY)'];
        if (answers.channel === 'CRM / Email') qcTools.push('Request proofread in #proofread-crm on Slack');
        
        // Check if Dutch or Portuguese is in the selected languages array
        if (answers.language && (answers.language.includes('Dutch') || answers.language.includes('Portuguese'))) {
          qcTools.push('#new-markets-localization-help (for native NL/PT support)');
        }
        qcTools.push('Native review (if needed)');

        const uploadTools = [];
        if (answers.channel === 'Website' || answers.channel === 'CRM / Email') uploadTools.push('Qontent');
        else uploadTools.push('Upload directly on platform (' + answers.channel + ')');

        const steps = [
          { num: 1, title: 'EN Master Copy', owner: masterOwner, desc: 'Create EN master with channel bot. Use QualityGuard if not EN-native.', tools: masterTools },
          { num: 2, title: 'Localization', owner: locOwner, desc: 'Handle the localization for the selected market(s).', tools: locTools },
          { num: 3, title: 'Quality Check', owner: qcOwner, desc: 'Run QualityGuard as a mandatory first step. Request native review if the translator is not native.', tools: qcTools },
          { num: 4, title: 'Content Upload', owner: uploadOwner, desc: answers.channel === 'Website' ? '⚠️ Page duplication in other languages is 100% owned by Local Teams. They will duplicate the page in Qontent.' : 'Upload the finalized localized content to the platform.', tools: uploadTools },
        ];

        return (
          <div className="max-w-4xl mx-auto w-full pt-10 pb-20 px-4">
            
            {/* Header Summary Banner */}
            <div className="bg-[#F8F5FF] border border-[#E9D5FF] rounded-2xl p-6 mb-8 flex gap-12 text-sm flex-wrap">
              <div>
                <div className="text-purple-700 font-bold mb-1">Project Type:</div>
                <div className="text-slate-800 font-medium">{answers.projectType}</div>
              </div>
              <div>
                <div className="text-purple-700 font-bold mb-1">Languages:</div>
                <div className="text-slate-800 font-medium flex items-center gap-2">
                  {answers.language && answers.language.map(lang => {
                    switch(lang) {
                      case 'French': return '🇫🇷 ';
                      case 'German': return '🇩🇪 ';
                      case 'Italian': return '🇮🇹 ';
                      case 'Spanish': return '🇪🇸 ';
                      case 'Portuguese': return '🇵🇹 ';
                      case 'Dutch': return '🇳🇱 ';
                      default: return '';
                    }
                  }).join('')}
                  {answers.language ? answers.language.join(', ') : ''}
                </div>
              </div>
              <div>
                <div className="text-purple-700 font-bold mb-1">Channel:</div>
                <div className="text-slate-800 font-medium">{answers.channel}</div>
              </div>
            </div>

            {/* Steps List */}
            <div className="space-y-6">
              {steps.map((s) => (
                <div key={s.num} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex gap-6">
                  <div className="w-10 h-10 shrink-0 bg-indigo-500 rounded-full flex items-center justify-center text-white font-bold text-lg">
                    {s.num}
                  </div>
                  <div className="flex-1">
                    <h3 className="text-xl font-bold text-slate-900 mb-2">{s.num}. {s.title}</h3>
                    <div className="flex items-center gap-2 mb-3">
                      <UserIcon className="w-5 h-5 text-blue-600" />
                      <span className="font-bold text-blue-600">{s.owner}</span>
                    </div>
                    <p className="text-slate-700 mb-4">{formatLinks(s.desc)}</p>
                    
                    <div className="bg-[#F8FAFC] rounded-xl p-4 text-sm">
                      <div className="font-bold text-slate-700 mb-2">TOOLS:</div>
                      <ul className="space-y-1">
                        {s.tools.map((t, idx) => (
                          <li key={idx} className="text-slate-600">• {formatLinks(t)}</li>
                        ))}
                      </ul>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Self-serve Notion Link Banner */}
            {answers.projectType === 'Standard content' && (
              <div className="mt-8 bg-blue-50 border border-blue-200 rounded-2xl p-6 text-center shadow-sm">
                <BookOpen className="w-8 h-8 text-blue-500 mx-auto mb-3" />
                <h4 className="text-lg font-bold text-blue-900 mb-2">Need more help?</h4>
                <p className="text-blue-800">
                  Find more resources for self-serve projects in our <a href="https://www.notion.so/qonto/Self-service-Content-Hub-24d31ee4c6968012a815e4f458c7cdc9?source=copy_link#31931ee4c6968014b900cf7161ec49ab" target="_blank" rel="noopener noreferrer" className="font-bold underline hover:text-blue-600 transition-colors">Self-service Content Hub</a>!
                </p>
              </div>
            )}

            <div className="mt-10 flex justify-center">
              <button 
                onClick={() => {setStep(0); setAnswers({});}}
                className="flex items-center gap-2 px-6 py-3 bg-white border border-slate-200 shadow-sm rounded-xl font-semibold text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-all"
              >
                <ArrowLeft className="w-5 h-5" /> Start Over
              </button>
            </div>
          </div>
        );
      };

      return step < questions.length ? renderQuiz() : renderResults();
    };

    // --- MAIN APP (Handles Toggle) ---
    function App() {
      const [view, setView] = useState('path');
      const [selectedStep, setSelectedStep] = useState(null);
      const shouldDimPocCard = selectedStep !== null && selectedStep !== 2 && selectedStep !== 3;

      return (
        <div className="flex flex-col min-h-screen">
          
          {/* Top Navigation & Toggle */}
          <div className="flex flex-col sm:flex-row items-center justify-between py-4 px-8 bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50 gap-4">
            <div>
              <h1 className="text-xl font-bold text-slate-900">Localization Workflow</h1>
            </div>
            
            <div className="flex bg-[#F1F5F9] p-1 rounded-xl">
              <button 
                onClick={() => setView('workflow')}
                className={`flex items-center gap-2 px-4 py-2 text-sm font-semibold rounded-lg transition-all ${view === 'workflow' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-500 hover:text-slate-700'}`}
              >
                <WorkflowIcon className="w-4 h-4" />
                Full Workflow
              </button>
              <button 
                onClick={() => setView('path')}
                className={`flex items-center gap-2 px-4 py-2 text-sm font-semibold rounded-lg transition-all ${view === 'path' ? 'bg-slate-900 shadow-sm text-white' : 'text-slate-500 hover:text-slate-700'}`}
              >
                <GitBranchIcon className="w-4 h-4" />
                Find Your Path
              </button>
            </div>
          </div>

          {/* Render Views based on state */}
          {view === 'path' ? (
            <PathFinder />
          ) : (
            <div 
              className="flex-1 overflow-x-auto p-8 animate-in fade-in duration-500"
              onClick={(e) => { if (e.target === e.currentTarget) setSelectedStep(null); }}
            >
              <div className="min-w-max pb-12">
                {/* LIGNE 1 : CERCLES */}
                <div className="flex items-start gap-6 mb-8">
                  {WORKFLOW_STEPS.map((step, index) => {
                    const isSelected = selectedStep === step.id;
                    const isDimmed = selectedStep !== null && !isSelected;
                    return (
                      <div key={step.id} className="flex items-start gap-6">
                        <div className={`flex flex-col items-center gap-4 w-72 shrink-0 transition-all duration-500 ${isDimmed ? 'opacity-30 grayscale-[30%]' : 'opacity-100'}`}>
                          <button
                            onClick={(e) => { e.stopPropagation(); setSelectedStep(isSelected ? null : step.id); }}
                            className={`
                              relative flex flex-col items-center justify-center
                              w-40 h-40 rounded-full cursor-pointer
                              bg-gradient-to-br ${step.color} shadow-lg transition-all duration-300 hover:scale-105
                              ${isSelected ? 'ring-4 ring-blue-500 scale-105 shadow-2xl' : ''}
                              ${step.title.includes('MANDATORY') || step.subtitle.includes('MANDATORY') ? 'ring-4 ring-amber-400 animate-pulse' : ''}
                            `}
                          >
                            <div className="absolute -top-3 -right-3 w-10 h-10 rounded-full bg-white text-slate-900 flex items-center justify-center font-bold text-lg shadow-lg border-2 border-slate-200">{step.id}</div>
                            <div className="text-white text-center px-4">
                              <div className="font-bold text-sm mb-1">{step.title}</div>
                              <div className="text-xs opacity-90">{step.subtitle}</div>
                            </div>
                          </button>
                          {(step.id === 2 || step.id === 3) ? <div className="w-0.5 h-16 bg-gradient-to-b from-slate-400 to-indigo-400" /> : <div className="w-0.5 h-8 bg-gradient-to-b from-slate-300 to-transparent" />}
                        </div>
                        {index < WORKFLOW_STEPS.length - 1 && (
                          <div className={`flex items-center justify-center w-10 shrink-0 transition-opacity duration-500 ${isDimmed ? 'opacity-30' : 'opacity-100'}`} style={{ marginTop: '70px' }}>
                            <ChevronRight className="w-10 h-10 text-slate-300" />
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* LIGNE 2 : CARTES DÉTAILLÉES */}
                <div className="flex items-start gap-6">
                  {WORKFLOW_STEPS.map((step, index) => {
                    const isSelected = selectedStep === step.id;
                    const isDimmed = selectedStep !== null && !isSelected;
                    return (
                      <div key={`detail-${step.id}`} className="flex items-start gap-6">
                        <div className={`flex flex-col items-center gap-4 w-72 shrink-0 transition-all duration-500 ${isDimmed ? 'opacity-30 scale-[0.98]' : 'opacity-100 scale-100'}`}>
                          <div className={`w-full p-5 bg-white border border-slate-200 shadow-md rounded-xl transition-all duration-300 ${isSelected ? 'ring-2 ring-blue-500 shadow-xl border-blue-200 bg-blue-50/10' : ''}`}>
                            {step.owner && (
                              <div className="mb-4">
                                <div className="flex items-center gap-2 mb-2"><UserIcon className="w-4 h-4 text-blue-600" /><span className="text-xs font-bold text-slate-600">OWNER</span></div>
                                <p className="text-sm text-slate-900 whitespace-pre-line leading-relaxed">{step.owner}</p>
                              </div>
                            )}
                            {step.tools && step.tools.length > 0 && (
                              <div className="mb-4">
                                <div className="flex items-center gap-2 mb-2"><Wrench className="w-4 h-4 text-green-600" /><span className="text-xs font-bold text-slate-600">TOOLS</span></div>
                                <ul className="space-y-1.5 pl-1">{step.tools.map((tool, idx) => (<li key={idx} className="text-xs text-slate-700 leading-relaxed flex gap-2"><span className="text-green-500">•</span> <span>{formatLinks(tool)}</span></li>))}</ul>
                              </div>
                            )}
                            {step.notes && step.notes.length > 0 && (
                              <div className="mb-4">
                                <div className="text-xs font-bold text-slate-600 mb-2">NOTES</div>
                                <ul className="space-y-1.5 pl-1">{step.notes.map((note, idx) => (<li key={idx} className="text-xs text-slate-700 leading-relaxed whitespace-pre-line">{formatLinks(note)}</li>))}</ul>
                              </div>
                            )}
                            {step.gaps && step.gaps.length > 0 && (
                              <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                                <div className="flex items-center gap-2 mb-2"><AlertTriangle className="w-4 h-4 text-red-600" /><span className="text-xs font-bold text-red-700">PROCESS GAPS</span></div>
                                <ul className="space-y-1 pl-1">{step.gaps.map((gap, idx) => (<li key={idx} className="text-xs text-red-700 leading-relaxed flex gap-2"><span className="text-red-500">•</span> <span>{gap}</span></li>))}</ul>
                              </div>
                            )}
                            {step.questions && step.questions.length > 0 && (
                              <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg">
                                <div className="flex items-center gap-2 mb-2"><HelpCircle className="w-4 h-4 text-amber-600" /><span className="text-xs font-bold text-amber-700">OPEN QUESTIONS</span></div>
                                <ul className="space-y-1 pl-1">{step.questions.map((question, idx) => (<li key={idx} className="text-xs text-amber-700 leading-relaxed flex gap-2"><span className="text-amber-500">•</span> <span>{question}</span></li>))}</ul>
                              </div>
                            )}
                          </div>
                        </div>
                        {index < WORKFLOW_STEPS.length - 1 && <div className="w-10 shrink-0" />}
                      </div>
                    );
                  })}
                </div>

                {/* ZONE PARTAGÉE POCS */}
                <div className={`transition-all duration-500 ${shouldDimPocCard ? 'opacity-30 grayscale-[30%]' : 'opacity-100'}`}>
                  <div className="flex items-start gap-6 mt-8">
                    <div className="w-72 shrink-0"></div><div className="w-10 shrink-0"></div>
                    <div className="w-72 shrink-0 flex flex-col items-center"><div className="w-0.5 h-8 bg-gradient-to-b from-indigo-400 to-indigo-500"></div></div>
                    <div className="w-10 shrink-0"></div>
                    <div className="w-72 shrink-0 flex flex-col items-center"><div className="w-0.5 h-8 bg-gradient-to-b from-indigo-400 to-indigo-500"></div></div>
                  </div>
                  <div className="flex items-start gap-6">
                    <div className="w-72 shrink-0"></div><div className="w-10 shrink-0"></div>
                    <div className="flex items-center" style={{ width: '664px' }}><div className="h-0.5 w-full bg-gradient-to-r from-indigo-500 via-indigo-400 to-indigo-500"></div></div>
                  </div>
                  <div className="flex items-start gap-6 mt-4">
                    <div className="w-72 shrink-0"></div><div className="w-10 shrink-0"></div>
                    <div className="flex justify-center shrink-0" style={{ width: '664px' }}>
                      <div className="w-full max-w-xl p-5 bg-gradient-to-br from-indigo-50 to-blue-50 border-indigo-300 border-2 shadow-lg rounded-xl">
                        <div className="flex items-center gap-2 mb-3"><UsersIcon className="w-5 h-5 text-indigo-600" /><span className="text-sm font-bold text-indigo-700">LOCAL POCS & CONTACTS</span><span className="text-xs text-indigo-500 ml-auto">(for Steps 2 & 3)</span></div>
                        <div className="text-xs text-indigo-900 leading-relaxed whitespace-pre-line">
                          {'👥 Dedicated Local POCs for localization:\n• France: @Delphine de Roquemaurel\n• Germany: @Hannah Lüdicke\n• Italy: @lollo\n• Spain: @cristina.gomez\n• Portugal: @Julia Latorre\n• Netherlands:\n  - Non-SEO/non-partnerships: @rosemarijn.disseldorp\n  - SEO: @Dimitri Jordens\n  - Partnerships: @stijn.teves\n• Slack help: #new-markets-localization-help'}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
